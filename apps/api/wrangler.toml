name = "rewrite-api"
account_id = "fac906e305f0f4df576524f107365e35"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.rewrite.so", custom_domain = true }
]

[observability]
enabled = true

# CORS 白名单：Chrome Web Store 正式扩展 ID（gheiendipgcgiligfmbimbbffkkfiamk）。
# 逗号分隔可加多个；本地 unpacked dev 不受此限（isLocalApi 路径放行）。
[vars]
EXTENSION_ALLOWED_ORIGINS = "chrome-extension://gheiendipgcgiligfmbimbbffkkfiamk"

# Cron Trigger: 每天 09:00 UTC 跑一次 onboarding 邮件 dispatcher。
# dispatcher 内部按 user_email_state 列幂等，重跑不会重发。
[triggers]
crons = ["0 9 * * *"]

# ===== D1: 业务数据库 =====
[[d1_databases]]
binding = "DB"
database_name = "rewrite-so"
database_id = "d11cbc0a-f2ac-4d2d-8338-336a9c90a07b"
# wrangler 内置 migrations runner：扫这个目录的 NNNN_*.sql，
# 用 d1_migrations 表追踪已应用版本，幂等。
migrations_dir = "src/db/migrations"

# ===== KV: 用户设置缓存 =====
[[kv_namespaces]]
binding = "KV"
id = "b089e54c9b274495a16ab5f62d146715"

# ===== Durable Object: 限流（秒级 burst） =====
[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

# ===== Secrets（用 wrangler secret put 设置）=====
# OPENAI_BASE_URL / OPENAI_API_KEY / OPENAI_MODEL
# BYOK_MASTER_KEY
# GOOGLE_OAUTH_CLIENT_ID / GOOGLE_OAUTH_CLIENT_SECRET
# BETTER_AUTH_SECRET
# RESEND_API_KEY
# CREEM_API_KEY / CREEM_WEBHOOK_SECRET
# CREEM_PRO_MONTHLY_PRODUCT_ID / CREEM_PRO_YEARLY_PRODUCT_ID
# TURNSTILE_SECRET
# EXTENSION_INSTALL_URL 可用 [vars] 配置；未配置时回退 GitHub latest release。
# EXTENSION_ALLOWED_ORIGINS 可用 [vars] 配置；逗号分隔 Chrome extension origin / ID。
