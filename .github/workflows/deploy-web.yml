name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to rewrite.so
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # typecheck 留作 deploy gate；test 不重复跑（ci.yml 已跑过）
      - name: Typecheck
        run: pnpm --filter @rewrite/web typecheck

      # build 时把 API_BASE_URL 烘焙进 next rewrites（destination 在 build 时定死）
      # wrangler.toml [vars] 是 runtime-only 不影响 build，所以这里必须显式 export
      - name: OpenNext build
        working-directory: apps/web
        env:
          API_BASE_URL: https://api.rewrite.so
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
          NEXT_PUBLIC_EXTENSION_INSTALL_URL: ${{ vars.NEXT_PUBLIC_EXTENSION_INSTALL_URL }}
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy worker
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      - name: Smoke test
        run: |
          for i in 1 2 3; do
            if curl -sSf https://rewrite.so/ -o /dev/null; then
              echo "web home OK"
              exit 0
            fi
            echo "attempt $i failed, retry in 5s"
            sleep 5
          done
          exit 1
