name: Deploy API

# 触发：
# - push 到 main 且改了 apps/api/** / packages/** / lockfile
# - 手动 dispatch
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-api
  cancel-in-progress: false  # 不取消进行中的部署，避免半部署

jobs:
  deploy:
    name: Deploy to api.rewrite.so
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # typecheck 留作 deploy gate（防部署破损版本）；test 不重复跑（ci.yml 已跑过）
      - name: Typecheck
        run: pnpm --filter @rewrite/api typecheck

      # 自动跑 D1 migrations。wrangler 用 d1_migrations 表追踪已应用版本，
      # 已应用的 NNNN_*.sql 会被跳过；新加的按文件名顺序执行。
      # 必须在 deploy 之前跑（schema 先就位，新代码才能用）。
      - name: Apply D1 migrations
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler d1 migrations apply rewrite-so --remote

      - name: Deploy worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      - name: Smoke test
        run: |
          for i in 1 2 3; do
            if curl -sSf https://api.rewrite.so/health | grep -q '"ok":true'; then
              echo "API health OK"
              exit 0
            fi
            echo "attempt $i failed, retry in 5s"
            sleep 5
          done
          echo "API health check failed after 3 attempts"
          exit 1
