name: Deploy API

# 触发：
# - push 到 main 且改了 apps/api/** 或 packages/** 或 lockfile
# - 手动从 Actions 标签触发（workflow_dispatch）
on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-api
  cancel-in-progress: false  # 部署不取消上一次（避免半部署）

jobs:
  deploy:
    name: Deploy to api.rewrite.so
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @rewrite/api typecheck

      - name: Test
        run: pnpm --filter @rewrite/api test

      - name: Deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      - name: Smoke test
        run: |
          for i in 1 2 3; do
            if curl -sSf https://api.rewrite.so/health | grep -q '"ok":true'; then
              echo "API health OK"
              exit 0
            fi
            echo "attempt $i failed, retry in 5s"
            sleep 5
          done
          echo "API health check failed after 3 attempts"
          exit 1
