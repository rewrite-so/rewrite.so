name: Apply D1 migrations

# 仅手动触发（避免误删表）。每次有新 migration 时去 Actions 标签页跑。
# 输入 file 时只跑指定文件；留空则跑全部 migrations 目录（按文件名排序）。
on:
  workflow_dispatch:
    inputs:
      file:
        description: '只跑指定 migration 文件（如 0002_creem.sql），留空跑全部'
        required: false
        default: ''
      target:
        description: '目标环境'
        required: true
        type: choice
        default: production
        options:
          - production
          - local-dry-run

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Apply migration(s)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          FLAG=""
          if [[ "${{ inputs.target }}" == "production" ]]; then
            FLAG="--remote"
          else
            FLAG="--local"
          fi

          if [[ -n "${{ inputs.file }}" ]]; then
            FILES=("src/db/migrations/${{ inputs.file }}")
          else
            FILES=(src/db/migrations/*.sql)
          fi

          for f in "${FILES[@]}"; do
            echo "==> applying $f to ${{ inputs.target }}"
            pnpm exec wrangler d1 execute rewrite-so $FLAG --file="$f" --yes
          done
