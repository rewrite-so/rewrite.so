name: D1 migrations (manual)

# 日常 migration 由 deploy-api.yml 自动跑（在 deploy 之前）。
# 本 workflow 只用于手动场景：
# - 跑某个特定 migration（input file）作为补救
# - 跑某个 SQL 脚本（input file 路径）作为运维（如临时 backfill）
# - 在 local-dry-run 模式下试运行（target=local-dry-run）
on:
  workflow_dispatch:
    inputs:
      file:
        description: '指定 sql 文件路径（相对 apps/api/）。留空则等价 wrangler d1 migrations apply'
        required: false
        default: ''
      target:
        description: '目标'
        required: true
        type: choice
        default: production
        options:
          - production
          - local-dry-run

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Run
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          if [[ "${{ inputs.target }}" == "production" ]]; then
            FLAG="--remote"
          else
            FLAG="--local"
          fi

          if [[ -z "${{ inputs.file }}" ]]; then
            echo "==> wrangler d1 migrations apply (跑所有未应用的 migrations)"
            pnpm exec wrangler d1 migrations apply rewrite-so $FLAG
          else
            echo "==> wrangler d1 execute --file=${{ inputs.file }}"
            pnpm exec wrangler d1 execute rewrite-so $FLAG --file="${{ inputs.file }}" --yes
          fi
